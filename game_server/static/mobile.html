<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>残响协议</title>
<style>
  :root {
    --bg: #0a0a12;
    --surface: #141420;
    --surface2: #1a1a2e;
    --border: #2a2a3e;
    --text: #c8c8d8;
    --text-dim: #787898;
    --gold: #c4a45a;
    --gold-dim: #8a7040;
    --red: #8b3a3a;
    --red-bright: #c0392b;
    --blue: #3a5a8b;
    --green: #3a7a4a;
    --player-bubble: #1a2a3e;
    --ai-bubble: #1a1a28;
    --ai-border: #c4a45a;
    --input-bg: #1a1a2e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    -webkit-tap-highlight-color: transparent;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
  }

  /* ===== Status Bar ===== */
  #status-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    flex-shrink: 0;
  }
  #status-bar .phase-icon { font-size: 18px; }
  #status-bar .info { flex: 1; }
  #status-bar .info .day { color: var(--gold); font-weight: 600; }
  #status-bar .info .meta { color: var(--text-dim); font-size: 11px; }
  #status-bar .btn-sm {
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
  }
  #status-bar .btn-sm:active { background: var(--border); }

  /* ===== Character Panel (collapsible) ===== */
  #char-panel {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
    flex-shrink: 0;
  }
  #char-panel.open { max-height: 300px; overflow-y: auto; }
  #char-panel .char-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px; font-size: 12px;
    border-bottom: 1px solid var(--border);
  }
  #char-panel .char-row:last-child { border-bottom: none; }
  #char-panel .char-name { flex: 1; font-weight: 600; min-width: 70px; }
  #char-panel .char-stat { color: var(--text-dim); font-size: 11px; white-space: nowrap; }
  .hp-bar {
    width: 40px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .hp-bar .fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
  .hp-bar .fill.high { background: var(--green); }
  .hp-bar .fill.mid { background: var(--gold); }
  .hp-bar .fill.low { background: var(--red-bright); }
  .dead { color: var(--red-bright); text-decoration: line-through; }

  /* ===== Chat Area ===== */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-y: contain;
  }
  #chat > * { margin-bottom: 14px; }
  #chat > *:last-child { margin-bottom: 4px; }

  .msg { max-width: 90%; word-break: break-word; }
  .msg.player { margin-left: auto; }
  .msg.ai { margin-right: auto; }
  .msg.system { margin: 8px auto; max-width: 100%; }

  .msg .label {
    font-size: 11px; color: var(--text-dim); margin-bottom: 2px;
  }
  .msg.player .label { text-align: right; }
  .msg.ai .label { color: var(--gold-dim); }

  .msg .bubble {
    padding: 10px 14px; border-radius: 10px; line-height: 1.65;
    font-size: 15px; word-break: break-word; white-space: pre-wrap;
  }
  .msg.player .bubble { background: var(--player-bubble); color: #b8c8e8; }
  .msg.ai .bubble {
    background: var(--ai-bubble);
    border-left: 3px solid var(--ai-border);
    color: #d0d0d8;
  }
  .msg.system .bubble {
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 12px;
    text-align: center;
    padding: 6px 12px;
    border-radius: 20px;
  }

  /* Loading dots */
  .typing-indicator {
    display: flex; gap: 4px; padding: 4px 0;
  }
  .typing-indicator span {
    width: 6px; height: 6px; background: var(--gold-dim);
    border-radius: 50%; animation: blink 1.4s infinite both;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }

  /* Progress indicator during arbiter */
  .progress-msg {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--text-dim); padding: 4px 0;
  }
  .progress-msg .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--gold-dim);
  }
  .progress-msg .dot.done { background: var(--green); }

  /* ===== Input Area ===== */
  #input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 12px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    display: flex; gap: 8px; align-items: center;
    flex-shrink: 0;
  }
  #cmd-input {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 16px; /* prevent iOS zoom */
    font-family: inherit;
    outline: none;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.5;
    overflow-y: auto;
  }
  #cmd-input:focus { border-color: var(--gold-dim); }
  #cmd-input::placeholder { color: var(--text-dim); }
  #send-btn {
    background: var(--gold);
    color: #0a0a12;
    border: none;
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    min-height: 44px;
  }
  #send-btn:active { opacity: 0.8; }
  #send-btn:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; }

  /* ===== Game Over Modal ===== */
  #game-over-modal {
    display: none;
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85); z-index: 100;
    justify-content: center; align-items: center; flex-direction: column; gap: 16px;
  }
  #game-over-modal.show { display: flex; }
  #game-over-modal .result-icon { font-size: 64px; }
  #game-over-modal .result-text { font-size: 28px; font-weight: 700; color: var(--gold); }
  #game-over-modal .result-detail { color: var(--text-dim); font-size: 14px; }
  #game-over-modal button {
    background: var(--gold); color: #0a0a12; border: none;
    padding: 12px 32px; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer;
  }

  /* ===== Init Screen ===== */
  #init-screen {
    flex: 1; display: flex;
    flex-direction: column; justify-content: center; align-items: center; gap: 16px;
  }
  #init-screen h1 { color: var(--gold); font-size: 22px; }
  #init-screen p { color: var(--text-dim); font-size: 14px; text-align: center; }
  #init-screen button {
    background: var(--gold); color: #0a0a12; border: none;
    padding: 14px 40px; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer;
  }
  #app { display: none; flex-direction: column; height: 100%; }
  #app.active { display: flex; }
  #init-screen.hidden { display: none; }

  /* ===== Error toast ===== */
  #toast {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    background: var(--red); color: #fff; padding: 10px 20px;
    border-radius: 8px; font-size: 14px; z-index: 200;
    opacity: 0; transition: opacity 0.3s;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- Init Screen -->
<div id="init-screen">
  <h1>🌙 万能愿望机</h1>
  <p>残响协议 · 实时剧情生成<br>AI 动态叙事引擎</p>
  <button onclick="initGame()">▶ 契约缔结</button>
</div>

<!-- Game App -->
<div id="app">
  <div id="status-bar">
    <span class="phase-icon" id="phase-icon">🌙</span>
    <span class="info">
      <span class="day" id="day-info">第 1 天 · 夜</span><br>
      <span class="meta" id="turn-info">回合 0</span>
    </span>
    <button class="btn-sm" onclick="toggleChars()">📋 英灵</button>
    <button class="btn-sm" onclick="resetGame()">🔄 重开</button>
  </div>

  <div id="char-panel"></div>

  <div id="chat"></div>

  <div id="input-area">
    <textarea id="cmd-input"
           placeholder="输入你的战术指令..."
           autocomplete="off"
           rows="1"></textarea>
    <button id="send-btn" onclick="sendCommand()">发送</button>
  </div>
</div>

<!-- Game Over Modal -->
<div id="game-over-modal">
  <span class="result-icon" id="result-icon"></span>
  <span class="result-text" id="result-text"></span>
  <span class="result-detail" id="result-detail"></span>
  <button onclick="initGame()">重新缔结契约</button>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ============================================================
// State
// ============================================================
let state = {
  sessionId: null,
  playerServantKey: '',
  playerServantName: '',
  memory: null,
  processing: false,
};

// ============================================================
// Init / Reset
// ============================================================
async function initGame() {
  try {
    showSystemMsg('🌙 圣杯系统启动中，正在随机抽取 7 骑英灵...');
    const res = await fetch('/api/game/init', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: '{}',
    });
    if (!res.ok) throw new Error((await res.json()).detail || 'Init failed');

    const data = await res.json();
    state.sessionId = data.session_id;
    state.playerServantKey = data.player_servant_key;
    state.playerServantName = data.player_servant_name;
    state.memory = data.memory_system;

    document.getElementById('init-screen').classList.add('hidden');
    document.getElementById('app').classList.add('active');
    document.getElementById('game-over-modal').classList.remove('show');
    document.getElementById('chat').innerHTML = '';

    updateStatusBar();
    updateCharPanel();
    showSystemMsg(
      `契约缔结完成。你的英灵是 ${data.player_servant_name}。\n` +
      `参战英灵: ${Object.values(data.active_servants).join('、')}\n` +
      `Session: ${data.session_id}`
    );
    document.getElementById('cmd-input').focus();
  } catch (e) {
    showToast('初始化失败: ' + e.message);
  }
}

function resetGame() {
  if (state.processing) return;
  state = { sessionId: null, playerServantKey: '', playerServantName: '', memory: null, processing: false };
  document.getElementById('init-screen').classList.remove('hidden');
  document.getElementById('app').classList.remove('active');
  document.getElementById('chat').innerHTML = '';
}

// ============================================================
// Send Command (SSE streaming)
// ============================================================
async function sendCommand() {
  if (state.processing) return;
  const input = document.getElementById('cmd-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';  // reset textarea height
  input.focus();
  state.processing = true;
  document.getElementById('send-btn').disabled = true;

  // Show player message
  showPlayerMsg(text);

  // Create AI message container with loading indicator
  const aiEl = createAIMessage();
  showLoadingDots(aiEl);

  try {
    const response = await fetch('/api/game/execute_turn/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: state.sessionId, player_input: text }),
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.detail || `HTTP ${response.status}`);
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    let routerDone = false, arbiterDone = false, narratorStarted = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const events = parseSSE(buffer);
      buffer = events.remainder;

      for (const ev of events.parsed) {
        switch (ev.event) {
          case 'router_done':
            routerDone = true;
            showProgress(aiEl, 'router', ev.data);
            break;
          case 'arbiter_start':
            showProgress(aiEl, 'arbiter_start');
            break;
          case 'arbiter_done':
            arbiterDone = true;
            showProgress(aiEl, 'arbiter_done', ev.data);
            break;
          case 'narrator_start':
            narratorStarted = true;
            clearBubble(aiEl);
            break;
          case 'narrator_chunk':
            if (!narratorStarted) clearBubble(aiEl);
            narratorStarted = true;
            appendText(aiEl, ev.data.text || '');
            break;
          case 'turn_complete':
            state.memory = ev.data.memory_system;
            updateStatusBar();
            updateCharPanel();
            if (ev.data.game_over) {
              showGameOver(ev.data.game_over);
            }
            break;
          case 'error':
            showError(aiEl, ev.data.message || ev.data.code || '未知错误');
            break;
        }
      }
    }
  } catch (e) {
    showError(aiEl, e.message);
  } finally {
    state.processing = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('cmd-input').focus();
  }
}

// ============================================================
// SSE Parser
// ============================================================
function parseSSE(buffer) {
  const parsed = [];
  let remainder = buffer;

  // Split by double newline (SSE event boundary)
  while (true) {
    const idx = remainder.indexOf('\n\n');
    if (idx === -1) break;

    const block = remainder.substring(0, idx);
    remainder = remainder.substring(idx + 2);

    let event = 'message', data = '{}';
    for (const line of block.split('\n')) {
      if (line.startsWith('event: ')) event = line.substring(7).trim();
      else if (line.startsWith('data: ')) data = line.substring(6);
    }
    try { parsed.push({ event, data: JSON.parse(data) }); }
    catch (e) { /* skip malformed */ }
  }

  return { parsed, remainder };
}

// ============================================================
// Chat Rendering
// ============================================================
function showPlayerMsg(text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg player';
  div.innerHTML = `<span class="label">你</span><div class="bubble">${escapeHtml(text)}</div>`;
  chat.appendChild(div);
  scrollBottom();
}

function createAIMessage() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = '<span class="label">残响叙事</span><div class="bubble"></div>';
  chat.appendChild(div);
  scrollBottom();
  return div;
}

function showLoadingDots(el) {
  el.querySelector('.bubble').innerHTML =
    '<div class="typing-indicator"><span></span><span></span><span></span></div>';
  scrollBottom();
}

function showProgress(el, step, data) {
  const bubble = el.querySelector('.bubble');
  // Keep existing progress lines
  let html = bubble.innerHTML;
  if (html.includes('typing-indicator')) html = '';

  if (step === 'router') {
    html += `<div class="progress-msg" data-step="router"><span class="dot done"></span> 路由打分: ${data?.complexity_score ?? '?'}/10 (${data?.source ?? ''})</div>`;
  } else if (step === 'arbiter_start') {
    html += `<div class="progress-msg" data-step="arbiter"><span class="dot"></span> 因果律推演中...</div>`;
  } else if (step === 'arbiter_done') {
    const arb = bubble.querySelector('[data-step="arbiter"] .dot');
    if (arb) arb.classList.add('done');
    const snippet = data?.judgment_snippet || '';
    html += `<div class="progress-msg"><span class="dot done"></span> 判定完成${snippet ? ': ' + escapeHtml(snippet) + '...' : ''}</div>`;
  }

  bubble.innerHTML = html;
  scrollBottom();
}

function clearBubble(el) {
  el.querySelector('.bubble').innerHTML = '';
}

function appendText(el, text) {
  el.querySelector('.bubble').textContent += text;
  scrollBottom();
}

function showError(el, msg) {
  el.querySelector('.bubble').innerHTML =
    `<span style="color:var(--red-bright)">⚠ ${escapeHtml(msg)}</span>`;
  scrollBottom();
}

function showSystemMsg(text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg system';
  div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
  chat.appendChild(div);
  scrollBottom();
}

// ============================================================
// Status Bar
// ============================================================
function updateStatusBar() {
  if (!state.memory) return;
  const m = state.memory;
  const isNight = m.current_phase === 'night';
  document.getElementById('phase-icon').textContent = isNight ? '🌙' : '☀️';
  document.getElementById('day-info').textContent =
    `第 ${m.current_day} 天 · ${isNight ? '夜' : '昼'}`;
  // Count turns from chronicle length (approximate)
  const turns = (m.chronicle_history?.length || 0);
  document.getElementById('turn-info').textContent = `回合 ${turns} | ${state.sessionId}`;
}

// ============================================================
// Character Panel
// ============================================================
function updateCharPanel() {
  const panel = document.getElementById('char-panel');
  if (!state.memory?.current_snapshot) { panel.innerHTML = ''; return; }

  const snap = state.memory.current_snapshot;
  const entries = Object.entries(snap);
  // Sort: player servant first, then masters, then other servants
  const playerKey = state.playerServantKey;
  const isMaster = k => k.endsWith('_Master') || k === 'Player';

  entries.sort((a, b) => {
    if (a[0] === playerKey) return -1;
    if (b[0] === playerKey) return 1;
    const aM = isMaster(a[0]), bM = isMaster(b[0]);
    if (aM && !bM) return -1;
    if (!aM && bM) return 1;
    return a[0].localeCompare(b[0]);
  });

  panel.innerHTML = entries.map(([key, ch]) => {
    const alive = ch.is_alive && ch.hp > 0;
    const hpPct = Math.max(0, Math.min(100, Math.round(ch.hp / (ch.max_hp || 100) * 100)));
    const hpClass = hpPct > 60 ? 'high' : hpPct > 30 ? 'mid' : 'low';
    const isPlayer = key === playerKey;
    const isPlayerMaster = key === 'Protagonist_Master';
    const shortName = key.replace(/_/g, ' ');

    return `
      <div class="char-row ${alive ? '' : 'dead'}">
        <span class="char-name">${isPlayer ? '⭐' : ''}${isPlayerMaster ? '👤' : ''} ${escapeHtml(shortName)}</span>
        <span class="char-stat">HP</span>
        <div class="hp-bar"><div class="fill ${hpClass}" style="width:${hpPct}%"></div></div>
        <span class="char-stat">${ch.hp}/${ch.max_hp}</span>
        <span class="char-stat">🔮${ch.mana_remaining ?? 0}</span>
        ${isMaster(key) ? `<span class="char-stat">令咒:${ch.command_spells ?? 0}</span>` : ''}
      </div>`;
  }).join('');
}

function toggleChars() {
  document.getElementById('char-panel').classList.toggle('open');
}

// ============================================================
// Game Over
// ============================================================
function showGameOver(info) {
  const modal = document.getElementById('game-over-modal');
  const icons = { victory: '🏆', defeat: '💀', draw: '⚖️' };
  const texts = { victory: '圣杯属于你', defeat: '败北', draw: '平局' };

  document.getElementById('result-icon').textContent = icons[info.result] || '⚖️';
  document.getElementById('result-text').textContent = texts[info.result] || info.result;
  document.getElementById('result-detail').textContent =
    info.winner_name ? `胜者: ${info.winner_name}` : '圣杯未显现';
  modal.classList.add('show');
  document.getElementById('send-btn').disabled = true;
}

// ============================================================
// Utility
// ============================================================
function scrollBottom() {
  const chat = document.getElementById('chat');
  requestAnimationFrame(() => { chat.scrollTop = chat.scrollHeight; });
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), 3000);
}

// ============================================================
// Keyboard & Textarea
// ============================================================
const cmdInput = document.getElementById('cmd-input');

cmdInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendCommand();
  }
});

// Auto-resize textarea
cmdInput.addEventListener('input', () => {
  cmdInput.style.height = 'auto';
  cmdInput.style.height = Math.min(cmdInput.scrollHeight, 120) + 'px';
});

// ============================================================
// Auto-focus on app switch
// ============================================================
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && state.sessionId && !state.processing) {
    document.getElementById('cmd-input')?.focus();
  }
});
</script>
</body>
</html>
